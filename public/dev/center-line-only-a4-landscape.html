<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orta çizgi referansı (spread A4 yatay)</title>
  <style>
    /* book-styles spread ile aynı: beyaz zemin, orta çizgi */
    @page {
      margin: 0;
    }
    @page spread {
      size: 297mm 210mm;
      margin: 0;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, sans-serif;
      background: #ffffff;
    }
    .page {
      position: relative;
      overflow: hidden;
      page-break-after: always;
    }
    .page:last-child {
      page-break-after: auto;
    }
    .spread-page {
      page: spread;
      width: 297mm;
      height: 210mm;
      background: #ffffff;
      position: relative;
    }
    .spread-container {
      width: 100%;
      height: 100%;
      display: flex;
      position: relative;
      z-index: 1;
    }
    .half-page {
      width: 50%;
      height: 100%;
      position: relative;
      padding: 10mm;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spread-container::after {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      width: 0;
      height: 100%;
      border-left: 1px dashed rgba(232, 213, 192, 0.4);
      z-index: 1;
      display: block;
    }
  </style>
</head>
<body>
  <div class="page spread-page">
    <div class="spread-container">
      <div class="half-page"></div>
      <div class="half-page"></div>
    </div>
  </div>
</body>
</html>
